<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules — CA Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                    }
                }
            }
        }
    </script>
    <style>
        .rule-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .rule-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15); }
        .category-badge { transition: all 0.2s; }
        .category-badge:hover { transform: scale(1.05); }
        .search-input { transition: all 0.2s; }
        .search-input:focus { transform: translateY(-1px); box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.15); }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-primary-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg">🔬</div>
            <div>
                <div class="font-bold text-gray-900 leading-tight text-sm">CA Lab</div>
                <div class="text-xs text-gray-500">Rule Library</div>
            </div>
        </div>
        <div class="flex items-center gap-1">
            <a href="/" class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium transition-all">Home</a>
            <a href="/rules" class="px-4 py-2 rounded-lg bg-primary-50 text-primary-700 text-sm font-medium transition-all">Rules</a>
            <a href="/sessions" class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium transition-all">Sessions</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Rule Library</h1>
                <p class="text-sm text-gray-500 mt-1">Browse built-in rules or create your own</p>
            </div>
            <a href="/rules/new" class="bg-primary-600 hover:bg-primary-700 text-white px-6 py-3 rounded-xl font-semibold text-sm flex items-center gap-2 shadow-lg shadow-primary-200 transition-all hover:translate-y-[-2px]">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"/></svg>
                New Rule
            </a>
        </div>

        <!-- Search & Filters -->
        <div class="flex gap-3 mb-6">
            <div class="flex-1 relative">
                <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
                <input type="text" id="search-rules" placeholder="Search rules..." class="search-input w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none text-sm">
            </div>
            <select id="filter-category" class="px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none text-sm bg-white min-w-[150px]">
                <option value="">All Categories</option>
            </select>
        </div>

        <!-- Rules Grid -->
        <div id="rules-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="bg-white rounded-2xl border border-gray-200 p-8 text-center animate-slide-up">
                <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center mx-auto mb-3">
                    <svg class="w-6 h-6 text-gray-400 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                </div>
                <p class="text-gray-500 text-sm">Loading rules...</p>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>
        let allRules = [];

        async function loadRules() {
            try {
                allRules = await api.get('/api/rules/');
                renderRules(allRules);
                populateCategories();
            } catch (e) {
                toast('Failed to load rules: ' + e.message, 'error');
            }
        }

        function renderRules(rules) {
            const container = document.getElementById('rules-list');
            if (rules.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="text-4xl mb-3">📭</div>
                        <p class="text-gray-500">No rules found.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = rules.map((r, i) => `
                <div class="rule-card bg-white rounded-2xl border border-gray-200 p-5 animate-slide-up" style="animation-delay: ${i * 50}ms">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-100 to-primary-50 flex items-center justify-center text-lg shadow-sm">
                                ${r.category === 'classic' ? '🎮' : r.category === 'multi-state' ? '🌈' : '🔬'}
                            </div>
                            <div>
                                <div class="font-bold text-gray-900 text-sm">${r.name}</div>
                                <div class="category-badge inline-block mt-1 px-2 py-0.5 rounded-md text-xs font-medium ${getCategoryColor(r.category)}">
                                    ${r.category}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-1">
                            ${r.is_builtin ? '<span class="px-2 py-1 rounded-md bg-gray-100 text-gray-500 text-xs font-medium">Built-in</span>' : '<span class="px-2 py-1 rounded-md bg-primary-50 text-primary-600 text-xs font-medium">Custom</span>'}
                        </div>
                    </div>
                    <p class="text-sm text-gray-500 mb-4 line-clamp-2">${r.description || 'No description'}</p>
                    <div class="flex items-center gap-2">
                        ${r.is_editable ? `<a href="/rules/${r.id}" class="flex-1 text-center py-2 rounded-xl bg-gray-50 hover:bg-gray-100 text-gray-700 text-sm font-medium transition-all">Edit</a>` : ''}
                        <a href="/sessions/new?rule=${r.id}" class="flex-1 text-center py-2 rounded-xl bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium transition-all shadow-sm shadow-primary-200">Use</a>
                    </div>
                </div>
            `).join('');
        }

        function getCategoryColor(cat) {
            const colors = {
                'classic': 'bg-emerald-50 text-emerald-600',
                'multi-state': 'bg-purple-50 text-purple-600',
                'experimental': 'bg-amber-50 text-amber-600',
            };
            return colors[cat] || 'bg-gray-50 text-gray-600';
        }

        function populateCategories() {
            const categories = [...new Set(allRules.map(r => r.category))];
            const select = document.getElementById('filter-category');
            select.innerHTML = '<option value="">All Categories</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // Search filter
        document.getElementById('search-rules').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const category = document.getElementById('filter-category').value;
            const filtered = allRules.filter(r => {
                const matchesQuery = r.name.toLowerCase().includes(query) || (r.description && r.description.toLowerCase().includes(query));
                const matchesCategory = !category || r.category === category;
                return matchesQuery && matchesCategory;
            });
            renderRules(filtered);
        });

        document.getElementById('filter-category').addEventListener('change', (e) => {
            const category = e.target.value;
            const query = document.getElementById('search-rules').value.toLowerCase();
            const filtered = allRules.filter(r => {
                const matchesQuery = r.name.toLowerCase().includes(query) || (r.description && r.description.toLowerCase().includes(query));
                const matchesCategory = !category || r.category === category;
                return matchesQuery && matchesCategory;
            });
            renderRules(filtered);
        });

        loadRules();
    </script>
</body>
</html>
